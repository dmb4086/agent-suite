<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Suite — Inbox</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --border: #2a2a3a;
      --accent: #7c6cff;
      --accent-hover: #9b8dff;
      --text: #e8e8f0;
      --muted: #888899;
      --success: #4caf79;
      --danger: #f05050;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    /* Nav */
    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .logo { font-weight: 700; font-size: 18px; color: var(--accent); letter-spacing: -0.5px; }
    .nav-links a { color: var(--muted); text-decoration: none; margin-left: 24px; font-size: 14px; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }

    /* Layout */
    .layout { display: flex; height: calc(100vh - 56px); }
    .sidebar { width: 300px; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .main { flex: 1; overflow-y: auto; padding: 0; }

    /* API key bar */
    .api-bar { padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--bg); display: flex; gap: 8px; }
    .api-bar input { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 12px; }
    .api-bar input:focus { outline: none; border-color: var(--accent); }
    .api-bar button { background: var(--accent); color: #fff; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: background 0.2s; }
    .api-bar button:hover { background: var(--accent-hover); }

    /* Toolbar */
    .toolbar { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
    .toolbar-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
    .toolbar-btn:hover { border-color: var(--accent); color: var(--text); }
    .toolbar-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .badge { background: var(--accent); color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 10px; margin-left: 4px; }

    /* Message list */
    .msg-list { overflow-y: auto; flex: 1; }
    .msg-item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; display: flex; flex-direction: column; gap: 3px; }
    .msg-item:hover { background: var(--surface); }
    .msg-item.active { background: #1e1e30; border-left: 3px solid var(--accent); }
    .msg-item.unread .msg-from { font-weight: 700; color: var(--text); }
    .msg-from { font-size: 13px; color: var(--muted); display: flex; justify-content: space-between; }
    .msg-subject { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .msg-preview { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .msg-time { font-size: 10px; color: var(--muted); }
    .unread-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; display: inline-block; margin-right: 6px; flex-shrink: 0; }

    /* Empty state */
    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--muted); padding: 40px; text-align: center; }
    .empty-icon { font-size: 48px; }

    /* Message detail */
    .detail { padding: 32px; }
    .detail-header { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .detail-subject { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
    .detail-meta { display: flex; flex-direction: column; gap: 4px; font-size: 13px; color: var(--muted); }
    .detail-meta span strong { color: var(--text); }
    .detail-body { font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
    .detail-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; }
    .detail-placeholder p { color: var(--muted); font-size: 15px; }

    /* Loading skeleton */
    .skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; height: 14px; margin: 6px 0; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Toast */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); padding: 12px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transform: translateY(10px); transition: all 0.3s; z-index: 999; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--danger); color: var(--danger); }

    /* Compose view */
    .compose { padding: 32px; max-width: 700px; }
    .compose h2 { font-size: 20px; font-weight: 700; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input, .form-group textarea {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 14px;
      font-family: inherit; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
    .form-group textarea { min-height: 200px; resize: vertical; }
    .send-btn {
      background: var(--accent); color: #fff; border: none;
      padding: 10px 28px; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Responsive */
    @media (max-width: 600px) {
      .sidebar { width: 100%; }
      .main { display: none; }
      .layout { flex-direction: column; }
    }
  </style>
</head>
<body>

<nav>
  <span class="logo">⚡ Agent Suite</span>
  <div class="nav-links">
    <a href="#" class="active" id="nav-inbox" onclick="showView('inbox')">Inbox</a>
    <a href="#" id="nav-compose" onclick="showView('compose')">Compose</a>
  </div>
</nav>

<div class="layout">
  <div class="sidebar">
    <div class="api-bar">
      <input type="password" id="apiKey" placeholder="Paste API key..." />
      <button onclick="loadInbox()">Connect</button>
    </div>
    <div class="toolbar">
      <button class="toolbar-btn active" id="btn-all" onclick="filterMessages('all')">All</button>
      <button class="toolbar-btn" id="btn-unread" onclick="filterMessages('unread')">Unread <span class="badge" id="unread-count">0</span></button>
      <button class="toolbar-btn" onclick="loadInbox()" style="margin-left:auto">↻</button>
    </div>
    <div class="msg-list" id="msgList">
      <div class="empty">
        <div class="empty-icon">📭</div>
        <p>Enter your API key to load messages</p>
      </div>
    </div>
  </div>

  <div class="main" id="mainArea">
    <div class="detail-placeholder" style="height:100%;display:flex;align-items:center;justify-content:center;">
      <p style="color:var(--muted)">Select a message to read it</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API_BASE = window.location.origin;
  let messages = [];
  let currentFilter = 'all';
  let currentView = 'inbox';

  // Persist API key
  const savedKey = localStorage.getItem('agent_suite_api_key');
  if (savedKey) document.getElementById('apiKey').value = savedKey;

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${type}`;
    setTimeout(() => t.className = 'toast', 3000);
  }

  function showView(view) {
    currentView = view;
    document.getElementById('nav-inbox').classList.toggle('active', view === 'inbox');
    document.getElementById('nav-compose').classList.toggle('active', view === 'compose');

    if (view === 'compose') {
      document.getElementById('mainArea').innerHTML = `
        <div class="compose">
          <h2>✉️ New Message</h2>
          <div class="form-group">
            <label>To</label>
            <input type="email" id="c-to" placeholder="recipient@example.com" />
          </div>
          <div class="form-group">
            <label>Subject</label>
            <input type="text" id="c-subject" placeholder="Subject..." />
          </div>
          <div class="form-group">
            <label>Message</label>
            <textarea id="c-body" placeholder="Write your message..."></textarea>
          </div>
          <button class="send-btn" onclick="sendEmail()">Send Message</button>
        </div>`;
    } else {
      document.getElementById('mainArea').innerHTML =
        '<div style="height:100%;display:flex;align-items:center;justify-content:center;"><p style="color:var(--muted)">Select a message to read it</p></div>';
    }
  }

  async function loadInbox() {
    const key = document.getElementById('apiKey').value.trim();
    if (!key) { showToast('Please enter an API key', 'error'); return; }
    localStorage.setItem('agent_suite_api_key', key);

    const list = document.getElementById('msgList');
    list.innerHTML = `<div style="padding:16px">${[1,2,3,4].map(() =>
      `<div style="margin-bottom:16px"><div class="skeleton" style="width:60%"></div><div class="skeleton" style="width:90%"></div><div class="skeleton" style="width:40%"></div></div>`
    ).join('')}</div>`;

    try {
      const res = await fetch(`${API_BASE}/v1/inboxes/me/messages?limit=50`, {
        headers: { 'Authorization': `Bearer ${key}` }
      });
      if (!res.ok) { showToast(`Error ${res.status}: ${res.statusText}`, 'error'); list.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><p>Failed to load. Check your API key.</p></div>'; return; }

      const data = await res.json();
      messages = data.messages || [];
      renderMessages();
      showToast(`Loaded ${messages.length} messages`);
    } catch(e) {
      showToast('Network error', 'error');
      list.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><p>Cannot connect to server</p></div>';
    }
  }

  function filterMessages(f) {
    currentFilter = f;
    document.getElementById('btn-all').classList.toggle('active', f === 'all');
    document.getElementById('btn-unread').classList.toggle('active', f === 'unread');
    renderMessages();
  }

  function renderMessages() {
    const filtered = currentFilter === 'unread' ? messages.filter(m => !m.is_read) : messages;
    const unread = messages.filter(m => !m.is_read).length;
    document.getElementById('unread-count').textContent = unread;

    const list = document.getElementById('msgList');
    if (!filtered.length) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">${currentFilter === 'unread' ? '✅' : '📭'}</div><p>${currentFilter === 'unread' ? 'No unread messages' : 'No messages yet'}</p></div>`;
      return;
    }

    list.innerHTML = filtered.map(m => `
      <div class="msg-item ${!m.is_read ? 'unread' : ''}" onclick="viewMessage(${m.id})" id="msg-${m.id}">
        <div class="msg-from">
          <span>${!m.is_read ? '<span class="unread-dot"></span>' : ''}${escHtml(m.sender || 'Unknown')}</span>
          <span class="msg-time">${formatTime(m.received_at)}</span>
        </div>
        <div class="msg-subject">${escHtml(m.subject || '(no subject)')}</div>
        <div class="msg-preview">${escHtml((m.body_text || '').slice(0, 80))}</div>
      </div>
    `).join('');
  }

  async function viewMessage(id) {
    const key = document.getElementById('apiKey').value.trim();
    document.querySelectorAll('.msg-item').forEach(el => el.classList.remove('active'));
    const el = document.getElementById(`msg-${id}`);
    if (el) { el.classList.add('active'); el.classList.remove('unread'); el.querySelector('.unread-dot')?.remove(); }

    // Mark read optimistically
    const msg = messages.find(m => m.id === id);
    if (msg) msg.is_read = true;

    try {
      const res = await fetch(`${API_BASE}/v1/inboxes/me/messages/${id}`, {
        headers: { 'Authorization': `Bearer ${key}` }
      });
      const m = res.ok ? await res.json() : msg;

      document.getElementById('mainArea').innerHTML = `
        <div class="detail">
          <div class="detail-header">
            <div class="detail-subject">${escHtml(m.subject || '(no subject)')}</div>
            <div class="detail-meta">
              <span><strong>From:</strong> ${escHtml(m.sender || 'Unknown')}</span>
              <span><strong>To:</strong> ${escHtml(m.recipient || '')}</span>
              <span><strong>Date:</strong> ${formatTime(m.received_at, true)}</span>
              ${m.message_id ? `<span style="font-size:11px;color:var(--muted)">ID: ${escHtml(m.message_id)}</span>` : ''}
            </div>
          </div>
          <div class="detail-body">${m.body_html
            ? `<iframe srcdoc="${escHtml(m.body_html)}" style="width:100%;min-height:400px;border:none;background:#fff;border-radius:8px;"></iframe>`
            : escHtml(m.body_text || '(empty)')}</div>
        </div>`;
    } catch(e) {
      document.getElementById('mainArea').innerHTML = `<div class="detail"><p style="color:var(--danger)">Failed to load message</p></div>`;
    }
  }

  async function sendEmail() {
    const key = document.getElementById('apiKey').value.trim();
    if (!key) { showToast('Connect your inbox first', 'error'); return; }
    const to = document.getElementById('c-to').value.trim();
    const subject = document.getElementById('c-subject').value.trim();
    const body = document.getElementById('c-body').value.trim();
    if (!to || !subject || !body) { showToast('Fill in all fields', 'error'); return; }

    const btn = document.querySelector('.send-btn');
    btn.disabled = true; btn.textContent = 'Sending...';

    try {
      const res = await fetch(`${API_BASE}/v1/inboxes/me/send`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ to, subject, body })
      });
      if (res.ok) { showToast('Message sent! ✉️'); showView('inbox'); loadInbox(); }
      else { const e = await res.json(); showToast(e.detail || 'Send failed', 'error'); }
    } catch(e) {
      showToast('Network error', 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Send Message';
    }
  }

  function formatTime(ts, full = false) {
    if (!ts) return '';
    const d = new Date(ts);
    if (full) return d.toLocaleString();
    const now = new Date();
    const diff = now - d;
    if (diff < 86400000 && d.getDate() === now.getDate()) return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    if (diff < 604800000) return d.toLocaleDateString([], {weekday:'short'});
    return d.toLocaleDateString([], {month:'short',day:'numeric'});
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
