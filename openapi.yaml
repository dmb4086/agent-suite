openapi: 3.0.0
info:
  title: Agent Suite API
  version: 0.1.0
  description: Infrastructure API for AI agents (Email without OAuth)
servers:
  - url: http://localhost:8000
paths:
  /v1/inboxes:
    post:
      summary: Create new inbox
      responses:
        '201':
          description: Created
  /v1/inboxes/me/send:
    post:
      summary: Send Email
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                to: {type: string}
                subject: {type: string}
                body: {type: string}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
